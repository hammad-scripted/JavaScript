<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Palette Generator</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="container">
      <h1>Color Palette Generator</h1>
      <button id="generate-btn">
        <i class="fas fa-sync-alt"> </i>
        Generate Palette
      </button>
      <div class="palette-container">
        <!-- Color box-1 -->
        <div class="color-box">
          <div class="color" style="background-color: #00ffff"></div>
          <div class="color-info">
            <span class="hex-value">#00FFFF</span>
            <i class="fa fa-copy copy-btn" title="Copy to clipboard"></i>
          </div>
        </div>
        <!-- Color box-2 -->
        <div class="color-box">
          <div class="color" style="background-color: #ff00ff"></div>
          <div class="color-info">
            <span class="hex-value">#FF00FF</span>
            <i class="fa fa-copy copy-btn" title="Copy to clipboard"></i>
          </div>
        </div>
        <!-- Color box-3 -->
        <div class="color-box">
          <div class="color" style="background-color: #ffff00"></div>
          <div class="color-info">
            <span class="hex-value">#FFFF00</span>
            <i class="fa fa-copy copy-btn" title="Copy to clipboard"></i>
          </div>
        </div>
        <!-- Color box-4 -->
        <div class="color-box">
          <div class="color" style="background-color: #00ff00"></div>
          <div class="color-info">
            <span class="hex-value">#00FF00</span>
            <i class="fa fa-copy copy-btn" title="Copy to clipboard"></i>
          </div>
        </div>
        <!-- Color box-5 -->
        <div class="color-box"> 
          <div class="color" style="background-color: #ff0000"></div>
          <div class="color-info    ">
            <span class="hex-value">#FF0000</span>
            <i class="fa fa-copy copy-btn" title="Copy to clipboard"></i>    
          </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
